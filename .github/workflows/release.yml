name: Release
on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x gradlew && ./gradlew build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get release notes from tag message
        id: notes
        run: |
          git fetch --tags --force
          NOTES=$(git tag -l --format='%(contents)' ${GITHUB_REF#refs/tags/})
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.version }}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: build/libs/*-all.jar

      # Modrinth
      - uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: AuMenus v${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          loaders: paper folia
          game-versions: 1.21.1
          files: build/libs/*-all.jar
          changelog: ${{ steps.notes.outputs.notes }}
        continue-on-error: true

      # Hangar
      - uses: HSGamer/action-mcreleaser@v1
        with:
          files: build/libs/*-all.jar
          platforms: hangar
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DESCRIPTION: ${{ steps.notes.outputs.notes }}
          GAME_VERSIONS: "1.21.1"
          HANGAR_KEY: ${{ secrets.HANGAR_KEY }}
          HANGAR_PROJECT: AuMenus
          HANGAR_OWNER: auvq
          HANGAR_PLATFORM: PAPER
          HANGAR_CHANNEL: Release
        continue-on-error: true

      # Polymart
      - uses: HSGamer/action-mcreleaser@v1
        with:
          files: build/libs/*-all.jar
          platforms: polymart
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DESCRIPTION: ${{ steps.notes.outputs.notes }}
          POLYMART_KEY: ${{ secrets.POLYMART_KEY }}
          POLYMART_RESOURCE: ${{ secrets.POLYMART_RESOURCE }}
          POLYMART_TAG: release
        continue-on-error: true

      # BuiltByBit (API call)
      - name: Upload to BuiltByBit
        if: ${{ secrets.BBB_TOKEN != '' }}
        run: |
          FILE=$(ls build/libs/*-all.jar | head -1)
          BASE64=$(base64 -w 0 "$FILE")
          FILENAME=$(basename "$FILE")
          curl -s -X POST "https://api.builtbybit.com/v1/resources/${{ secrets.BBB_RESOURCE }}/versions" \
            -H "Authorization: Private ${{ secrets.BBB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"v${{ steps.version.outputs.version }}\",\"description\":\"${{ steps.notes.outputs.notes }}\",\"file\":{\"name\":\"$FILENAME\",\"content\":\"$BASE64\"}}"
        continue-on-error: true
