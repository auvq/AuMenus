name: Release
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew build

      - name: Gather info
        id: info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          git fetch --tags --force
          NOTES=$(git for-each-ref --format='%(contents:subject)' "refs/tags/$TAG")
          [ -z "$NOTES" ] && NOTES="Release $VERSION"
          JAR=$(ls build/libs/*.jar | head -1)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
          echo "jar=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Notes: $NOTES"
          echo "Jar: $JAR"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.info.outputs.version }}
          body: ${{ steps.info.outputs.notes }}
          files: ${{ steps.info.outputs.jar }}

      - name: Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: AuMenus v${{ steps.info.outputs.version }}
          version: ${{ steps.info.outputs.version }}
          version-type: release
          loaders: |
            paper
            folia
          game-versions: |
            >=1.21.1
          files: ${{ steps.info.outputs.jar }}
          changelog: ${{ steps.info.outputs.notes }}
        continue-on-error: true

      - name: Hangar
        env:
          VERSION: ${{ steps.info.outputs.version }}
          NOTES: ${{ steps.info.outputs.notes }}
          JAR: ${{ steps.info.outputs.jar }}
          HANGAR_KEY: ${{ secrets.HANGAR_KEY }}
        run: |
          JWT=$(curl -s -X POST "https://hangar.papermc.io/api/v1/authenticate?apiKey=$HANGAR_KEY" | jq -r '.token')
          echo "JWT length: ${#JWT}"
          jq -n --arg v "$VERSION" --arg d "$NOTES" \
            '{"version":$v,"channel":"Release","description":$d,"platformDependencies":{"PAPER":["1.21.1"]},"files":[{"platforms":["PAPER"]}]}' > /tmp/version.json
          cat /tmp/version.json
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "https://hangar.papermc.io/api/v1/projects/AuMenus/upload" \
            -H "Authorization: HangarAuth $JWT" \
            -F "versionUpload=@/tmp/version.json;type=application/json" \
            -F "files=@$JAR")
          echo "$RESPONSE"
        continue-on-error: true

      - name: Polymart
        env:
          VERSION: ${{ steps.info.outputs.version }}
          NOTES: ${{ steps.info.outputs.notes }}
          JAR: ${{ steps.info.outputs.jar }}
          POLYMART_KEY: ${{ secrets.POLYMART_KEY }}
          POLYMART_RESOURCE: ${{ secrets.POLYMART_RESOURCE }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.polymart.org/v1/doPostUpdate" \
            -F "api_key=$POLYMART_KEY" \
            -F "resource_id=$POLYMART_RESOURCE" \
            -F "version=$VERSION" \
            -F "title=v$VERSION" \
            -F "message=$NOTES" \
            -F "file=@$JAR")
          echo "$RESPONSE"
        continue-on-error: true

