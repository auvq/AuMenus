name: Release
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew build

      - name: Version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Release notes
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents)' ${GITHUB_REF#refs/tags/})
          [ -z "$NOTES" ] && NOTES="Release ${{ steps.version.outputs.version }}"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Jar path
        id: jar
        run: echo "path=$(ls build/libs/*.jar | head -1)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: ${{ steps.jar.outputs.path }}

      - uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: AuMenus v${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release
          loaders: |
            paper
            folia
          game-versions: |
            >=1.21.1
          files: ${{ steps.jar.outputs.path }}
          changelog: ${{ steps.notes.outputs.notes }}
        continue-on-error: true

      - name: Hangar
        run: |
          JWT=$(curl -s -X POST "https://hangar.papermc.io/api/v1/authenticate?apiKey=${{ secrets.HANGAR_KEY }}" | jq -r '.token')
          curl -s -X POST "https://hangar.papermc.io/api/v1/projects/AuMenus/upload" \
            -H "Authorization: $JWT" \
            -F 'versionUpload={"version":"${{ steps.version.outputs.version }}","channel":"Release","description":"${{ steps.notes.outputs.notes }}","platformDependencies":{"PAPER":["1.21.1"]},"files":[{"platforms":["PAPER"]}]};type=application/json' \
            -F "files=@${{ steps.jar.outputs.path }}"
        continue-on-error: true

      - name: Polymart
        run: |
          curl -s -X POST "https://api.polymart.org/v1/postUpdate" \
            -F "api_key=${{ secrets.POLYMART_KEY }}" \
            -F "resource_id=${{ secrets.POLYMART_RESOURCE }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "title=v${{ steps.version.outputs.version }}" \
            -F "message=${{ steps.notes.outputs.notes }}" \
            -F "file=@${{ steps.jar.outputs.path }}"
        continue-on-error: true
